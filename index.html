<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contato</title>

  <!-- Google Fonts: Cormorant Garamond + Nunito -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <style>
    /* ── TOKENS ─────────────────────────────────────────── */
    :root {
      --c1: #ffe4e8;
      --c2: #ffc2cb;
      --c3: #ffaab8;
      --c4: #f78fa0;
      --c5: #e8607a;
      --c6: #c94060;
      --text-dark: #4a2030;
      --text-mid:  #7a4055;
      --text-soft: #b07080;
      --gold: #c97a8a;
      --glass: rgba(255,255,255,0.55);
      --glass-border: rgba(255,180,195,0.45);
      --shadow: 0 24px 64px rgba(200,100,120,0.18);
      --radius: 20px;
    }

    /* ── RESET & BASE ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(255,180,195,0.55) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 80%, rgba(247,143,160,0.4) 0%, transparent 55%),
        linear-gradient(160deg, #fff0f2 0%, #ffd6dd 35%, #ffc0cc 65%, #ffaab8 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* ── DECORATIVE CIRCLES ──────────────────────────────── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      top: -180px; left: -180px;
      background: radial-gradient(circle, rgba(255,160,180,0.35), transparent 70%);
      animation: pulse 8s ease-in-out infinite;
    }
    body::after {
      width: 400px; height: 400px;
      bottom: -150px; right: -120px;
      background: radial-gradient(circle, rgba(247,143,160,0.3), transparent 70%);
      animation: pulse 10s ease-in-out 2s infinite reverse;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: .7; }
      50%       { transform: scale(1.1); opacity: 1;  }
    }

    /* ── CARD ────────────────────────────────────────────── */
    .contact-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(160%);
      -webkit-backdrop-filter: blur(22px) saturate(160%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.7);
      overflow: hidden;
      animation: slideUp .7s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px) scale(.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);   }
    }

    /* ── CARD HEADER ─────────────────────────────────────── */
    .card-header-custom {
      position: relative;
      padding: 44px 48px 32px;
      background: linear-gradient(135deg, rgba(255,160,180,0.45) 0%, rgba(255,220,228,0.2) 100%);
      border-bottom: 1px solid var(--glass-border);
      overflow: hidden;
    }
    .card-header-custom::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 18px,
        rgba(255,255,255,0.12) 18px,
        rgba(255,255,255,0.12) 19px
      );
    }
    .badge-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--c6);
      background: rgba(201,64,96,.1);
      border: 1px solid rgba(201,64,96,.25);
      border-radius: 100px;
      padding: 5px 14px;
      margin-bottom: 16px;
    }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text-dark);
      text-shadow: 0 2px 12px rgba(200,100,120,0.15);
    }
    .card-title span {
      color: var(--c5);
      font-style: italic;
    }
    .card-subtitle {
      margin-top: 10px;
      font-size: .9rem;
      font-weight: 400;
      color: var(--text-mid);
      letter-spacing: .02em;
    }

    /* ── FORM AREA ───────────────────────────────────────── */
    .card-body-custom {
      padding: 40px 48px 48px;
    }

    /* ── FLOATING LABEL OVERRIDE ─────────────────────────── */
    .form-floating { margin-bottom: 20px; }

    .form-floating > .form-control,
    .form-floating > .form-select {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,160,180,0.5);
      border-radius: 12px;
      color: var(--text-dark);
      font-family: 'Nunito', sans-serif;
      font-size: .95rem;
      transition: border-color .25s, background .25s, box-shadow .25s;
      height: 58px;
    }

    .form-floating > textarea.form-control {
      height: 130px;
      resize: none;
      padding-top: 28px;
    }

    .form-floating > .form-control:focus,
    .form-floating > .form-select:focus {
      background: rgba(255,255,255,0.92);
      border-color: var(--c5);
      box-shadow: 0 0 0 3px rgba(232,96,122,.18);
      color: var(--text-dark);
      outline: none;
    }

    .form-floating > .form-control::placeholder { color: transparent; }
    .form-floating > label {
      color: var(--text-soft);
      font-size: .88rem;
      font-weight: 400;
      padding: 18px 16px;
    }
    .form-floating > .form-control:focus ~ label,
    .form-floating > .form-control:not(:placeholder-shown) ~ label,
    .form-floating > .form-select ~ label {
      color: var(--c5);
      font-size: .76rem;
      font-weight: 600;
    }

    /* Autofill fix */
    .form-control:-webkit-autofill {
      -webkit-text-fill-color: var(--text-dark) !important;
      -webkit-box-shadow: 0 0 0 1000px rgba(255,240,242,.9) inset !important;
    }

    /* ── ICON INSIDE FIELD ───────────────────────────────── */
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .bi {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(232,96,122,.4);
      font-size: 1rem;
      pointer-events: none;
      z-index: 5;
    }
    .input-icon-wrap textarea ~ .bi { top: 24px; transform: none; }

    /* ── DIVIDER ─────────────────────────────────────────── */
    .section-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--c5);
      margin-bottom: 14px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(232,96,122,.3), transparent);
    }

    /* ── SUBMIT BUTTON ───────────────────────────────────── */
    .btn-submit {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--c4) 0%, var(--c5) 60%, var(--c6) 100%);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .05em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(232,96,122,.3);
      transition: transform .2s, box-shadow .2s;
      margin-top: 10px;
    }
    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.22), transparent);
      opacity: 0;
      transition: opacity .25s;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(232,96,122,.38); }
    .btn-submit:hover::before { opacity: 1; }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit .spinner-border { width: 1.1rem; height: 1.1rem; border-width: 2px; }

    /* ── TOAST ───────────────────────────────────────────── */
    .toast-container { z-index: 9999; }
    .toast-custom {
      background: rgba(255,240,243,0.97);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,180,195,0.5);
      border-radius: 14px;
      color: var(--text-dark);
      min-width: 300px;
    }
    .toast-custom.success { border-color: rgba(100,200,130,.45); }
    .toast-custom.error   { border-color: rgba(232,96,122,.45); }
    .toast-icon { font-size: 1.3rem; }

    /* ── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 576px) {
      .card-header-custom, .card-body-custom { padding-left: 24px; padding-right: 24px; }
    }
  </style>
</head>
<body>

  <!-- Toast container -->
  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="liveToast" class="toast toast-custom align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
      <div class="d-flex align-items-center gap-3 p-3">
        <span class="toast-icon" id="toastIcon"></span>
        <div class="me-auto" id="toastMsg"></div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast" aria-label="Fechar"></button>
      </div>
    </div>
  </div>

  <!-- Card -->
  <div class="contact-card">

    <!-- Header -->
    <div class="card-header-custom">
      <div class="badge-label">
        <i class="bi bi-envelope-heart-fill"></i> Entre em contato
      </div>
      <h1 class="card-title">Fale <span>Conosco</span></h1>
      <p class="card-subtitle">Preencha o formulário e retornaremos em breve.</p>
    </div>

    <!-- Body -->
    <div class="card-body-custom">
      <form id="contactForm" novalidate>

        <!-- Dados pessoais -->
        <div class="section-label">Dados Pessoais</div>
        <div class="row g-3 mb-1">
          <div class="col-sm-6">
            <div class="form-floating input-icon-wrap">
              <input type="text" class="form-control" id="firstName" placeholder="Nome" required minlength="2"/>
              <label for="firstName"><i class="bi bi-person me-1"></i> Nome</label>
              <i class="bi bi-person-fill"></i>
            </div>
          </div>
          <div class="col-sm-6">
            <div class="form-floating input-icon-wrap">
              <input type="text" class="form-control" id="lastName" placeholder="Sobrenome" required minlength="2"/>
              <label for="lastName"><i class="bi bi-person me-1"></i> Sobrenome</label>
              <i class="bi bi-person-lines-fill"></i>
            </div>
          </div>
        </div>

        <!-- Endereço -->
        <div class="section-label mt-3">Endereço</div>
        <div class="row g-3 mb-1">
          <div class="col-sm-7">
            <div class="form-floating input-icon-wrap">
              <input type="text" class="form-control" id="cep" placeholder="CEP" required
                     pattern="\d{5}-?\d{3}" maxlength="9"/>
              <label for="cep"><i class="bi bi-geo-alt me-1"></i> CEP</label>
              <i class="bi bi-geo-alt-fill"></i>
            </div>
          </div>
          <div class="col-sm-5">
            <div class="form-floating input-icon-wrap">
              <input type="text" class="form-control" id="number" placeholder="Número" required/>
              <label for="number"><i class="bi bi-hash me-1"></i> Número</label>
              <i class="bi bi-hash"></i>
            </div>
          </div>
        </div>

        <!-- Comentários -->
        <div class="section-label mt-3">Mensagem</div>
        <div class="form-floating input-icon-wrap">
          <textarea class="form-control" id="comments" placeholder="Comentários" required minlength="10"></textarea>
          <label for="comments"><i class="bi bi-chat-text me-1"></i> Comentários</label>
          <i class="bi bi-chat-dots-fill" style="top:20px;transform:none"></i>
        </div>

        <button type="submit" class="btn-submit mt-3" id="submitBtn">
          <span id="btnText"><i class="bi bi-send-fill me-2"></i>Enviar Mensagem</span>
          <span id="btnSpinner" class="d-none">
            <span class="spinner-border me-2" role="status"></span>Enviando…
          </span>
        </button>

      </form>
    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
   /* ═══════════════════════════════════════════════════════
   🔥 FIREBASE — config carregada via /api/firebaseConfig
   ═══════════════════════════════════════════════════════ */

let db = null;
let firebaseReady = null; // ← guarda a Promise de inicialização

async function initFirebase() {
  try {
    const res = await fetch('/api/firebaseConfig');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const firebaseConfig = await res.json();
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  } catch (err) {
    console.error('Falha ao carregar configuração do Firebase:', err);
    showToast('Erro ao conectar com o servidor. Tente novamente.', false);
    throw err; // re-lança para o await no submit saber que falhou
  }
}

/* ── CEP MASK ────────────────────────────────────────── */
document.getElementById('cep').addEventListener('input', function () {
  let v = this.value.replace(/\D/g, '').slice(0, 8);
  if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5);
  this.value = v;
});

/* ── TOAST HELPER ────────────────────────────────────── */
function showToast(msg, success = true) {
  const el   = document.getElementById('liveToast');
  const icon = document.getElementById('toastIcon');
  const text = document.getElementById('toastMsg');
  el.classList.toggle('success', success);
  el.classList.toggle('error',  !success);
  icon.textContent = success ? '✅' : '❌';
  text.textContent = msg;
  bootstrap.Toast.getOrCreateInstance(el).show();
}

/* ── FORM SUBMIT ─────────────────────────────────────── */
document.getElementById('contactForm').addEventListener('submit', async function (e) {
  e.preventDefault();

  const form    = this;
  const btn     = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const btnSpin = document.getElementById('btnSpinner');

  // Validação Bootstrap
  form.classList.add('was-validated');
  if (!form.checkValidity()) return;

  // Estado de carregamento imediato
  btn.disabled = true;
  btnText.classList.add('d-none');
  btnSpin.classList.remove('d-none');

  try {
    // ← aguarda o Firebase estar pronto antes de continuar
    await firebaseReady;

    const payload = {
      firstName: document.getElementById('firstName').value.trim(),
      lastName:  document.getElementById('lastName').value.trim(),
      cep:       document.getElementById('cep').value.trim(),
      number:    document.getElementById('number').value.trim(),
      comments:  document.getElementById('comments').value.trim(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    await db.collection('contacts').add(payload);
    showToast('Mensagem enviada com sucesso! Em breve retornaremos. 🎉', true);
    form.reset();
    form.classList.remove('was-validated');
  } catch (err) {
    console.error(err);
    showToast('Erro ao enviar. Verifique as configurações do Firebase.', false);
  } finally {
    btn.disabled = false;
    btnText.classList.remove('d-none');
    btnSpin.classList.add('d-none');
  }
});

// Inicializa e guarda a Promise ← linha chave da correção
firebaseReady = initFirebase();
  </script>
</body>
</html>
